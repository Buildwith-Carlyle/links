<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Going To Ask Anyway, Here It Is</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F2; --surface: #FFFFFF; --border: #E5E3DC;
    --text: #1A1916; --muted: #8A8880;
    --serif: 'Cormorant Garamond', serif; --sans: 'DM Sans', sans-serif;
  }
  body { background: var(--bg); font-family: var(--sans); color: var(--text); min-height: 100vh; padding-bottom: 4rem; }

  .hero { position: relative; height: 260px; overflow: hidden; background: #1A1916; }
  .hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.55; }
  .hero-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 2rem; text-align: center; }
  .hero-title { font-family: var(--serif); font-size: clamp(1.6rem, 5vw, 2.4rem); font-weight: 300; color: #fff; letter-spacing: 0.04em; line-height: 1.2; max-width: 480px; padding: 0 1.5rem; }
  .hero-title em { font-style: italic; }

  .container { max-width: 560px; margin: 0 auto; padding: 0 1.25rem; }

  .intro { text-align: center; padding: 2rem 0 1.75rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; animation: fadeUp 0.5s ease both; }
  .intro p { font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 380px; margin: 0 auto; }
  .intro strong { color: var(--text); font-weight: 500; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 2rem; }

  .cat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.4rem 1.2rem 1.2rem; cursor: pointer; display: flex; flex-direction: column; gap: 8px; transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease; animation: fadeUp 0.5s ease both; }
  .cat-card:hover { transform: translateY(-3px); border-color: #C8C6BE; box-shadow: 0 8px 24px rgba(0,0,0,0.07); }
  .cat-card:active { transform: translateY(-1px); }
  .cat-card:nth-child(1) { animation-delay: 0.1s; }
  .cat-card:nth-child(2) { animation-delay: 0.15s; }
  .cat-card:nth-child(3) { animation-delay: 0.2s; }
  .cat-card:nth-child(4) { animation-delay: 0.25s; }
  .cat-icon { font-size: 22px; line-height: 1; margin-bottom: 2px; }
  .cat-name { font-family: var(--serif); font-size: 1.15rem; font-weight: 400; color: var(--text); letter-spacing: 0.01em; line-height: 1.2; }
  .cat-desc { font-size: 12px; color: var(--muted); line-height: 1.5; font-weight: 300; }
  .cat-count { font-size: 11px; color: var(--muted); margin-top: auto; padding-top: 10px; letter-spacing: 0.02em; }
  .badge { display: inline-block; font-size: 9px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; background: #F0EFE9; color: var(--muted); padding: 3px 8px; border-radius: 999px; margin-top: 6px; align-self: flex-start; }

  .panel-backdrop { display: none; position: fixed; inset: 0; background: rgba(20,19,17,0.45); z-index: 10; }
  .panel-backdrop.open { display: block; animation: fadeIn 0.2s ease; }
  .panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-radius: 20px 20px 0 0; z-index: 20; max-height: 82vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); }
  .panel.open { transform: translateY(0); }
  .panel-handle { width: 36px; height: 4px; background: #DDD; border-radius: 2px; margin: 12px auto 0; }
  .panel-header { padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .panel-icon { font-size: 20px; }
  .panel-title { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; color: var(--text); }
  .panel-close { margin-left: auto; width: 28px; height: 28px; border-radius: 50%; background: var(--bg); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; flex-shrink: 0; }
  .panel-close:hover { background: var(--border); }
  .panel-body { padding: 0.5rem 1.5rem 2rem; }

  .product-item { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .product-item:last-child { border-bottom: none; }
  .product-info { flex: 1; }
  .product-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .product-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .product-link { flex-shrink: 0; font-size: 11px; font-weight: 500; color: var(--text); text-decoration: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 999px; letter-spacing: 0.03em; transition: background 0.15s, border-color 0.15s; white-space: nowrap; }
  .product-link:hover { background: var(--text); color: #fff; border-color: var(--text); }

  .empty-msg { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 13px; line-height: 1.7; }
  .empty-msg span { display: block; font-size: 2rem; margin-bottom: 0.75rem; }

  .footer { text-align: center; padding-top: 1rem; font-size: 12px; color: var(--muted); animation: fadeUp 0.5s 0.4s ease both; }
  .footer a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @media (max-width: 360px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<script>
  // =====================================================
  // TO ADD/EDIT PRODUCTS: just tell Claude and I'll
  // update this file for you. Then re-upload to GitHub.
  // =====================================================
  const PRODUCTS = [

    // ---- DESK SETUP ----
    // Add your desk products here — replace the placeholders below
    { name: 'Monitor',        category: 'Desk Setup', desc: 'Add your monitor model and why you love it.', link: '#' },
    { name: 'Desk Lamp',      category: 'Desk Setup', desc: 'Add your lighting setup here.',               link: '#' },
    { name: 'Keyboard',       category: 'Desk Setup', desc: 'Add your keyboard here.',                     link: '#' },
    { name: 'Mouse',          category: 'Desk Setup', desc: 'Add your mouse here.',                        link: '#' },
    { name: 'Desk',           category: 'Desk Setup', desc: 'Add your desk here.',                         link: '#' },
    { name: 'Chair',          category: 'Desk Setup', desc: 'Add your chair here.',                        link: '#' },

    // ---- VIBE SETUP ----
    { name: 'Main Furniture', category: 'Vibe Setup', desc: 'Add the furniture that defines your space.',  link: '#' },
    { name: 'Wall Art',       category: 'Vibe Setup', desc: 'Add any prints or art you have up.',          link: '#' },
    { name: 'Plants',         category: 'Vibe Setup', desc: 'Add your plant picks here.',                  link: '#' },
    { name: 'Candles',        category: 'Vibe Setup', desc: 'Add your favourite candles or diffuser.',     link: '#' },

    // ---- 3D PLUGINS & SOFTWARE ----
    { name: 'Rhino 3D',       category: '3D Plugins & Software', desc: 'Industry-standard NURBS modelling — essential for architecture.',            link: 'https://www.rhino3d.com' },
    { name: 'Grasshopper',    category: '3D Plugins & Software', desc: 'Visual programming for parametric and algorithmic design inside Rhino.',     link: 'https://www.grasshopper3d.com' },
    { name: 'SketchUp Pro',   category: '3D Plugins & Software', desc: 'Fast and intuitive 3D modelling, great for concept and presentation models.',link: 'https://www.sketchup.com' },
    { name: 'Revit',          category: '3D Plugins & Software', desc: 'BIM platform for professional architectural design and documentation.',      link: 'https://www.autodesk.com/products/revit' },

    // ---- TEMPLATES ----
    // Uncomment and add when ready:
    // { name: 'Floor Plan Template', category: 'Templates', desc: 'Ready to use floor plan layout.', link: '#' },

  ];

  const CATEGORIES = [
    { key: 'Desk Setup',            icon: '🖥️', desc: 'Monitors, lighting, peripherals & accessories' },
    { key: 'Vibe Setup',            icon: '🎨', desc: 'Furniture, décor & atmosphere pieces'           },
    { key: '3D Plugins & Software', icon: '🧩', desc: 'Architecture software & modelling tools'        },
    { key: 'Templates',             icon: '📐', desc: 'Downloadable architecture templates'            },
  ];

  function openPanel(categoryKey) {
    const cat      = CATEGORIES.find(c => c.key === categoryKey);
    const products = PRODUCTS.filter(p => p.category === categoryKey);

    document.getElementById('panel-icon').textContent  = cat.icon;
    document.getElementById('panel-title').textContent = cat.key;

    const body = document.getElementById('panel-body');
    if (products.length === 0) {
      body.innerHTML = `<div class="empty-msg"><span>${cat.key === 'Templates' ? '🚧' : '📭'}</span>${
        cat.key === 'Templates'
          ? 'Templates are being prepared and dropping soon.<br>Follow on Instagram to be notified!'
          : 'No products added yet — check back soon!'
      }</div>`;
    } else {
      body.innerHTML = products.map(p => `
        <div class="product-item">
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-desc">${p.desc}</div>
          </div>
          <a class="product-link" href="${p.link}" target="_blank" rel="noopener">View →</a>
        </div>`).join('');
    }

    document.getElementById('backdrop').classList.add('open');
    document.getElementById('panel').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closePanel() {
    document.getElementById('backdrop').classList.remove('open');
    document.getElementById('panel').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

  window.addEventListener('DOMContentLoaded', () => {
    const grid = document.getElementById('cat-grid');
    grid.innerHTML = CATEGORIES.map((cat, i) => {
      const count      = PRODUCTS.filter(p => p.category === cat.key).length;
      const isTemplates = cat.key === 'Templates';
      return `
        <div class="cat-card" style="animation-delay:${0.1 + i * 0.05}s" onclick="openPanel('${cat.key}')">
          <span class="cat-icon">${cat.icon}</span>
          <span class="cat-name">${cat.key}</span>
          <span class="cat-desc">${cat.desc}</span>
          ${isTemplates && count === 0
            ? `<span class="badge">Coming soon</span>`
            : `<span class="cat-count">${count} item${count !== 1 ? 's' : ''} →</span>`}
        </div>`;
    }).join('');
  });
</script>

<!-- HERO -->
<div class="hero">
  <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e?w=1200&q=80" alt="Architecture studio">
  <div class="hero-overlay">
    <h1 class="hero-title">You're Going To Ask Anyway, <em>Here It Is</em></h1>
  </div>
</div>

<!-- MAIN -->
<div class="container">
  <div class="intro">
    <p>Architecture student & content creator. Everything I use in my videos — <strong>desk setup, vibe, 3D tools and templates</strong> — all in one place. Tap a category to explore.</p>
  </div>

  <div class="grid" id="cat-grid"></div>

  <div class="footer">
    Updated regularly &mdash; <a href="https://instagram.com" target="_blank">follow on Instagram</a> for new additions
  </div>
</div>

<!-- SLIDE-UP PANEL -->
<div class="panel-backdrop" id="backdrop" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <span class="panel-icon" id="panel-icon"></span>
    <span class="panel-title" id="panel-title"></span>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

</body>
</html>
